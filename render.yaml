services:
  - type: web
    name: chatbot-backend
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install --prefix backend
    startCommand: npm --prefix backend start
    nodeVersion: 20
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: web
    name: chatbot-frontend
    env: static
    plan: free
    rootDir: .
    buildCommand: npm install --prefix frontend && npm --prefix frontend run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://YOUR_BACKEND_URL.onrender.com/api
